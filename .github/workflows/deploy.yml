name: CI/CD for MemeVpn Bot

on:
  push:
    branches:
      - master

jobs:
  typecheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run typecheck

  deploy:
    needs: typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Deploy files to server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_IP_ADDRESS }} \
            "mkdir -p ~/meme_bot/bot"
          rsync -avz \
            --exclude=".git" \
            --exclude="node_modules" \
            --exclude=".env" \
            --exclude="dist" \
            ./ ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_IP_ADDRESS }}:~/meme_bot/bot

      - name: Create .env on server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_IP_ADDRESS }} \
            "echo '${{ secrets.BOT_ENV }}' > ~/meme_bot/bot/.env"

      - name: Rebuild and restart via docker compose
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_IP_ADDRESS }} bash << 'ENDSSH'
            cd ~/meme_bot/bot
            docker compose down
            docker compose up -d --build
            docker image prune -f
          ENDSSH
