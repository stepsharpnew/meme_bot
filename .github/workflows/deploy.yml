name: CI/CD for NYTREX VPN Bot

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check (bot)
        run: npm run bot:check

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Ensure Node.js on server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_IP_ADDRESS }} bash << 'ENDSSH'
            if ! command -v node &>/dev/null; then
              curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
              sudo apt-get install -y nodejs
            fi
            node -v
            npm -v
          ENDSSH

      - name: Deploy files to server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_IP_ADDRESS }} \
            "mkdir -p ~/meme_bot/bot"
          rsync -avz \
            --exclude=".git" \
            --exclude="node_modules" \
            --exclude=".env" \
            --exclude="webapp" \
            --exclude=".vercel" \
            ./ ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_IP_ADDRESS }}:~/meme_bot/bot

      - name: Create .env on server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_IP_ADDRESS }} \
            "echo '${{ secrets.BOT_ENV }}' > ~/meme_bot/bot/.env"

      - name: Restart bot on server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_IP_ADDRESS }} bash << 'ENDSSH'
            export PATH="$PATH:/usr/bin:/usr/local/bin"
            cd ~/meme_bot/bot

            npm ci

            if ! command -v pm2 &>/dev/null; then
              sudo npm install -g pm2 ts-node typescript
              pm2 startup systemd -u $USER --hp $HOME | tail -n 1 | sudo bash
            fi

            pm2 stop meme-bot 2>/dev/null || true
            pm2 delete meme-bot 2>/dev/null || true
            pm2 start "npx ts-node server/index.ts" \
              --name meme-bot \
              --restart-delay=5000 \
              --max-restarts=10
            pm2 save
          ENDSSH
